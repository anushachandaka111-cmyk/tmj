<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
background:transparent;
overflow:hidden;
}
.ticker{
width:100%;
overflow:hidden;
white-space:nowrap;
}
.ticker span{
display:inline-block;
padding-left:100%;
font-size:24px;
font-weight:bold;
color:inherit;
animation:scroll 15s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}
</style>
</head>
<body>
<div class="ticker">
<span>
  🙏 <span style="color:red;">WELCOME TO TELUGU MAHILA JAGRUTHI</span>
  &nbsp;&nbsp;&nbsp;
  🙏 <span style="color:green;">తెలుగు మహిళా జాగృతి వెబ్‌సైట్‌కు స్వాగతం...</span>
  &nbsp;&nbsp;&nbsp;
  🙏
</span>
</div>
</body>
</html>
