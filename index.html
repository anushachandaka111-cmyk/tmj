<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
background:transparent;
overflow:hidden;
}
.ticker{
width:100%;
overflow:hidden;
white-space:nowrap;
}
.ticker span{
display:inline-block;
padding-left:100%;
font-size:24px;
font-weight:bold;
color:green;
animation:scroll 15s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}
</style>
</head>
<body>
<div class="ticker">
<span>🙏 WELCOME TO TELUGU MAHILA JAGRUTHI 🙏 &nbsp;&nbsp;&nbsp; 🙏 తెలుగు మహిళా జాగృతి వెబ్‌సైట్‌లోకి స్వాగతం... సుస్వాగతం...  🙏</span>
</div>
</body>
</html>
